<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gallery | CodeAlpha</title>
    <style>
        /* Custom Design Tokens */
:root {
    --bg-color: #0b0c10;
    --card-bg: #1f2833;
    --text-main: #ffffff;
    --text-muted: #c5a880;
    --accent: #c5a880;
    --transition-smooth: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow-x: hidden;
    padding-bottom: 5rem;
}

/* Header & Filter Controls */
.gallery-header {
    text-align: center;
    padding: 5rem 2rem 3rem;
}

.gallery-header h1 {
    font-size: 2.5rem;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
}

.gallery-header p {
    color: var(--text-muted);
    font-size: 1rem;
    font-weight: 300;
}

.filter-controls {
    margin-top: 3rem;
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
}

.filter-btn {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-main);
    padding: 0.75rem 1.5rem;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: var(--transition-smooth);
}

.filter-btn:hover, .filter-btn.active {
    background-color: var(--text-main);
    color: var(--bg-color);
    border-color: var(--text-main);
}

/* Gallery Layout Grid */
.gallery-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 2rem;
    align-items: start;
}

/* Items and Image Handling */
.gallery-item {
    break-inside: avoid;
    opacity: 1;
    transform: scale(1);
    transition: transform 0.4s ease, opacity 0.4s ease;
}

/* Class applied via JS when an item is filtered out */
.gallery-item.hidden {
    display: none;
}

.image-wrapper {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background-color: var(--card-bg);
}

/* Setting varied heights for a structural visual rhythm */
.gallery-item:nth-child(2n) .image-wrapper { aspect-ratio: 4 / 5; }
.gallery-item:nth-child(2n+1) .image-wrapper { aspect-ratio: 1 / 1; }
.gallery-item:nth-child(3n) .image-wrapper { aspect-ratio: 16 / 10; }

.gallery-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(20%);
    transition: var(--transition-smooth);
}

/* Overlay Design */
.img-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, rgba(11, 12, 16, 0.9) 0%, rgba(11, 12, 16, 0.1) 70%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 2rem;
    opacity: 0;
    transition: var(--transition-smooth);
}

.img-category {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 0.25rem;
    transform: translateY(10px);
    transition: var(--transition-smooth);
}

.img-overlay h3 {
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 1px;
    transform: translateY(15px);
    transition: var(--transition-smooth);
}

/* Desktop Hover States */
@media (hover: hover) {
    .image-wrapper:hover .gallery-img {
        transform: scale(1.06);
        filter: grayscale(0%);
    }
    .image-wrapper:hover .img-overlay {
        opacity: 1;
    }
    .image-wrapper:hover .img-category,
    .image-wrapper:hover .img-overlay h3 {
        transform: translateY(0);
    }
}

/* Fullscreen Lightbox Modal */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: rgba(11, 12, 16, 0.98);
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.lightbox.active {
    opacity: 1;
    pointer-events: auto;
}

.lightbox-content {
    max-width: 85%;
    max-height: 80vh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#lightboxImg {
    max-width: 100%;
    max-height: 75vh;
    object-fit: contain;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    transform: scale(0.95);
    transition: var(--transition-smooth);
}

.lightbox.active #lightboxImg {
    transform: scale(1);
}

.lightbox-caption {
    margin-top: 1.5rem;
    font-size: 1rem;
    letter-spacing: 1px;
    font-weight: 300;
    color: var(--text-main);
    text-align: center;
}

/* Lightbox UI Elements */
.lightbox-close {
    position: absolute;
    top: 2rem;
    right: 2rem;
    background: transparent;
    border: none;
    color: #fff;
    font-size: 2.5rem;
    cursor: pointer;
    line-height: 1;
    z-index: 2010;
}

.lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.6);
    font-size: 3rem;
    cursor: pointer;
    padding: 2rem;
    transition: color 0.3s ease;
    z-index: 2010;
}

.lightbox-nav:hover { color: #fff; }
.prev { left: 1rem; }
.next { right: 1rem; }

/* Mobile Optimizations */
@media (max-width: 768px) {
    .gallery-grid { grid-template-columns: 1fr; }
    .lightbox-nav { display: none; } /* Use swipe/tap gestures on mobile */
    .img-overlay { opacity: 1; background: linear-gradient(to top, rgba(11, 12, 16, 0.8) 0%, transparent 50%); }
    .img-category, .img-overlay h3 { transform: translateY(0); }
}
    </style>
</head>
<body>

    <header class="gallery-header">
        <h1>Selected Works</h1>
        <p>A curated collection of architectural and minimalist photography</p>
        
        <!-- Filter Controls -->
        <div class="filter-controls">
            <button class="filter-btn active" data-filter="all">All Architecture</button>
            <button class="filter-btn" data-filter="minimal">Minimal</button>
            <button class="filter-btn" data-filter="brutalist">Brutalist</button>
            <button class="filter-btn" data-filter="interior">Interiors</button>
        </div>
    </header>

    <main class="gallery-container">
        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid">
            <!-- Item 1 -->
            <div class="gallery-item" data-category="minimal">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80" alt="Concrete Minimalist Villa" class="gallery-img">
                    <div class="img-overlay">
                        <span class="img-category">Minimal</span>
                        <h3>Villa Concrete</h3>
                    </div>
                </div>
            </div>
            <!-- Item 2 -->
            <div class="gallery-item" data-category="brutalist">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=800&q=80" alt="Monolithic Concrete Geometric Structure" class="gallery-img">
                    <div class="img-overlay">
                        <span class="img-category">Brutalist</span>
                        <h3>Lines & Shadow</h3>
                    </div>
                </div>
            </div>
            <!-- Item 3 -->
            <div class="gallery-item" data-category="interior">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=800&q=80" alt="Minimalist Japandi Living Space" class="gallery-img">
                    <div class="img-overlay">
                        <span class="img-category">Interior</span>
                        <h3>Japandi Calm</h3>
                    </div>
                </div>
            </div>
            <!-- Item 4 -->
            <div class="gallery-item" data-category="minimal">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=800&q=80" alt="White Curved Minimalist Staircase" class="gallery-img">
                    <div class="img-overlay">
                        <span class="img-category">Minimal</span>
                        <h3>The Curve</h3>
                    </div>
                </div>
            </div>
            <!-- Item 5 -->
            <div class="gallery-item" data-category="brutalist">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80" alt="Raw Concrete Geometric Facade" class="gallery-img">
                    <div class="img-overlay">
                        <span class="img-category">Brutalist</span>
                        <h3>Raw Geometry</h3>
                    </div>
                </div>
            </div>
            <!-- Item 6 -->
            <div class="gallery-item" data-category="interior">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=800&q=80" alt="Monolithic Marble Kitchen Island" class="gallery-img">
                    <div class="img-overlay">
                        <span class="img-category">Interior</span>
                        <h3>Monolith Kitchen</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Custom Lightbox Modal -->
    <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog">
        <button class="lightbox-close" aria-label="Close Lightbox">&times;</button>
        <button class="lightbox-nav prev" aria-label="Previous Image">&#10216;</button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImg">
            <div class="lightbox-caption" id="lightboxCaption"></div>
        </div>
        <button class="lightbox-nav next" aria-label="Next Image">&#10217;</button>
    </div>

    <script>
        
    </script>
</body>
</html>
